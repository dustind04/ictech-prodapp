  <text x="36" y="92" font-family="Inter, -apple-system, 'Segoe UI', sans-serif"
        font-size="76" font-weight="800" letter-spacing="-1">
    <tspan fill="#F4F4F2">Tech</tspan><tspan fill="#FFB020">Booth</tspan>
  </text>
  <text x="38" y="120" font-family="Inter, -apple-system, 'Segoe UI', sans-serif"
        font-size="17" font-weight="700" letter-spacing="6" fill="#7C7C82">A D2 PRODUCT</text>
</svg>
