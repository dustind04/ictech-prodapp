<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- TechBooth app icon — a face-on XLR, the most production object
       there is. The three pins mean something: People (top left),
       Tech (top right), Church (bottom — the foundation the other two
       connect across). Glyphs drop away below ~48 px; the favicon
       variant uses plain pins. D2 house style: acid on ink. -->
  <rect width="256" height="256" rx="56" fill="#10100e"/>
  <!-- connector shell -->
  <circle cx="128" cy="128" r="86" fill="none" stroke="#ffffff"
          stroke-opacity="0.16" stroke-width="14"/>
  <rect x="118" y="30" width="20" height="18" rx="5" fill="#ffffff" opacity="0.16"/>

  <!-- pin: PEOPLE -->
  <circle cx="92" cy="106" r="26" fill="#d8ff35"/>
  <g fill="#10100e">
    <circle cx="92" cy="99" r="8"/>
    <path d="M 78 121 a 14 14 0 0 1 28 0 z"/>
  </g>

  <!-- pin: TECH (fader) -->
  <circle cx="164" cy="106" r="26" fill="#d8ff35"/>
  <g fill="#10100e">
    <rect x="161" y="91" width="6" height="30" rx="3"/>
    <rect x="152" y="99" width="24" height="11" rx="4"/>
  </g>

  <!-- pin: CHURCH (cross) -->
  <circle cx="128" cy="168" r="26" fill="#d8ff35"/>
  <g fill="#10100e">
    <rect x="124" y="153" width="8" height="30" rx="3"/>
    <rect x="115" y="161" width="26" height="8" rx="3"/>
  </g>
</svg>
