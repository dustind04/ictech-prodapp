<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- MicMap app icon — a microphone that is also a map pin, on the
       D2 dark tile. The dot grid behind is the board: slots waiting
       for names. -->
  <rect width="256" height="256" rx="56" fill="#0E0E10"/>
  <g fill="#26262B">
    <circle cx="44" cy="52" r="5"/><circle cx="96" cy="52" r="5"/>
    <circle cx="160" cy="52" r="5"/><circle cx="212" cy="52" r="5"/>
    <circle cx="44" cy="112" r="5"/><circle cx="212" cy="112" r="5"/>
    <circle cx="44" cy="172" r="5"/><circle cx="96" cy="196" r="5"/>
    <circle cx="212" cy="172" r="5"/><circle cx="160" cy="196" r="5"/>
  </g>
  <!-- pin-mic body -->
  <path d="M128 218 C 106 174 76 152 76 104 a 52 52 0 1 1 104 0
           c 0 48 -30 70 -52 114 z" fill="#FFB020"/>
  <!-- grille hatch -->
  <g fill="#0E0E10" opacity="0.28">
    <rect x="96" y="76" width="64" height="9" rx="4.5"/>
    <rect x="92" y="96" width="72" height="9" rx="4.5"/>
    <rect x="96" y="116" width="64" height="9" rx="4.5"/>
  </g>
  <!-- live dot at the pin's point -->
  <circle cx="128" cy="228" r="9" fill="#3DDC84"/>
</svg>
